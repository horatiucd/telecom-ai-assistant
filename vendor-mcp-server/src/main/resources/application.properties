spring.application.name=vendor-mcp-server

server.port = 8082

spring.ai.mcp.server.name = telecom-vendor-mcp-server
spring.ai.mcp.server.version = 1.0.0
spring.ai.mcp.server.instructions = Instructions - endpoint: /mcp-vendor, type: sync, protocol: streamable

spring.ai.mcp.server.type = sync
spring.ai.mcp.server.protocol = streamable

spring.ai.mcp.server.streamable-http.mcp-endpoint = /mcp-vendor

spring.ai.mcp.server.capabilities.tool = true
spring.ai.mcp.server.capabilities.completion = false
spring.ai.mcp.server.capabilities.prompt = false
spring.ai.mcp.server.capabilities.resource = false

